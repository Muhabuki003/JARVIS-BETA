<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlivioVital | Real-Space AR</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        
        /* Full-screen Background Video */
        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
            z-index: -1;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        
        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;
            padding: 25px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            z-index: 10;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .control-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.6; }
        
        select, input[type="color"], input[type="file"] {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 10px;
            font-size: 13px;
            outline: none;
        }

        input[type="file"]::file-selector-button {
            background: #00f2ff;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            color: black;
            cursor: pointer;
            margin-right: 10px;
        }

        h2 { margin: 0 0 5px 0; font-weight: 300; letter-spacing: 2px; }
        p { font-size: 11px; opacity: 0.5; margin: 0 0 20px 0; }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>

    <div id="ui-panel">
        <h2>VELRA AR</h2>
        <p>Interactive Prototype Viewer</p>
        
        <div class="control-group">
            <label>Load Model (.glb)</label>
            <input type="file" id="file-upload" accept=".glb, .gltf">
        </div>

        <div class="control-group">
            <label>Visual Template</label>
            <select id="template-select">
                <option value="heart">Heart Aura</option>
                <option value="saturn">Saturn Rings</option>
                <option value="fireworks">Energy Cloud</option>
            </select>
        </div>

        <div class="control-group">
            <label>Aura Color</label>
            <input type="color" id="color-picker" value="#00f2ff">
        </div>

        <div style="font-size: 11px; border-top: 1px solid rgba(255,255,255,0.1); pt: 15px; opacity: 0.8;">
            • Move hand to position<br>
            • Pinch to scale<br>
            • Rotate wrist to spin
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Basic Scene ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights for GLB models
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        camera.position.z = 5;

        // --- Containers ---
        const mainGroup = new THREE.Group(); // This group will follow the hand
        scene.add(mainGroup);

        const loader = new GLTFLoader();
        let currentModel = null;

        // --- Particles ---
        const particleCount = 6000;
        const geometry = new THREE.BufferGeometry();
        const material = new THREE.PointsMaterial({ size: 0.03, transparent: true, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(geometry, material);
        mainGroup.add(particles);

        function createShape(type) {
            const pos = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                let x=0, y=0, z=0;
                if (type === 'heart') {
                    const t = Math.random() * Math.PI * 2;
                    x = 0.1 * (16 * Math.pow(Math.sin(t), 3));
                    y = 0.1 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                } else if (type === 'saturn') {
                    const r = 1.8 + Math.random() * 0.4;
                    const a = Math.random() * Math.PI * 2;
                    x = Math.cos(a) * r; z = Math.sin(a) * r;
                } else {
                    x = (Math.random()-0.5)*4; y = (Math.random()-0.5)*4; z = (Math.random()-0.5)*4;
                }
                pos[i*3] = x; pos[i*3+1] = y; pos[i*3+2] = z;
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        }
        createShape('heart');

        // --- File Handling ---
        document.getElementById('file-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            if (currentModel) mainGroup.remove(currentModel);
            loader.load(url, (gltf) => {
                currentModel = gltf.scene;
                const box = new THREE.Box3().setFromObject(currentModel);
                const size = box.getSize(new THREE.Vector3()).length();
                currentModel.scale.setScalar(1.5 / size); // Normalize size
                mainGroup.add(currentModel);
            });
        });

        // --- MediaPipe Tracking ---
        const videoElement = document.getElementById('webcam');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks?.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const indexTip = hand[8];
                const thumbTip = hand[4];

                // 1. POSITIONING
                const screenX = (1 - indexTip.x - 0.5) * 10 * (window.innerWidth / window.innerHeight);
                const screenY = (0.5 - indexTip.y) * 10;
                mainGroup.position.lerp(new THREE.Vector3(screenX, screenY, 0), 0.15);

                // 2. SCALING (Distance between thumb and index)
                const dist = Math.sqrt(Math.pow(thumbTip.x - indexTip.x, 2) + Math.pow(thumbTip.y - indexTip.y, 2));
                const scale = Math.max(0.2, dist * 10);
                mainGroup.scale.lerp(new THREE.Vector3(scale, scale, scale), 0.1);

                // 3. ROTATION (Angle between fingers)
                const angle = Math.atan2(indexTip.y - thumbTip.y, indexTip.x - thumbTip.x);
                mainGroup.rotation.z = THREE.MathUtils.lerp(mainGroup.rotation.z, -angle, 0.1);
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        cameraFeed.start();

        // --- UI Events ---
        document.getElementById('template-select').addEventListener('change', (e) => createShape(e.target.value));
        document.getElementById('color-picker').addEventListener('input', (e) => material.color.set(e.target.value));

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.005; // Ambient spin
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

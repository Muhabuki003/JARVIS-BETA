<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Model Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --arc: #00d4ff;
            --arc-dim: rgba(0,212,255,0.12);
            --arc-border: rgba(0,212,255,0.22);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Share Tech Mono', monospace; }

        #webcam {
            position: absolute;
            inset: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 0;
            filter: brightness(0.5) saturate(0.6);
        }

        canvas#three-canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Corner brackets only — minimal HUD */
        .corner {
            position: absolute;
            width: 32px; height: 32px;
            border-color: var(--arc);
            border-style: solid;
            opacity: 0.5;
            z-index: 2;
            pointer-events: none;
        }
        .c-tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
        .c-tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; }
        .c-bl { bottom: 16px; left: 16px; border-width: 0 0 2px 2px; }
        .c-br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; }

        /* Upload drop zone — shown when no model loaded */
        #drop-zone {
            position: absolute;
            inset: 0;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: rgba(0,0,0,0.72);
            transition: opacity 0.4s;
        }
        #drop-zone.hidden { opacity: 0; pointer-events: none; }

        .drop-box {
            border: 1px dashed var(--arc-border);
            border-radius: 4px;
            padding: 48px 64px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--arc-dim);
        }
        .drop-box:hover, .drop-box.drag-over {
            border-color: var(--arc);
            background: rgba(0,212,255,0.08);
        }
        .drop-icon {
            font-size: 36px;
            margin-bottom: 12px;
            opacity: 0.6;
        }
        .drop-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 3px;
            color: var(--arc);
            margin-bottom: 6px;
        }
        .drop-sub {
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.3);
        }
        #file-input { display: none; }

        /* Top left — model name */
        #model-label {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 3;
            pointer-events: none;
        }
        #model-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--arc);
            opacity: 0;
            transition: opacity 0.4s;
        }
        #model-name.visible { opacity: 0.8; }

        /* Bottom status bar */
        #status-bar {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            display: flex;
            align-items: center;
            gap: 24px;
            background: rgba(0,0,0,0.45);
            border: 1px solid var(--arc-border);
            border-bottom: 2px solid var(--arc);
            padding: 8px 24px;
            backdrop-filter: blur(10px);
            pointer-events: none;
            clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%, 0 10px);
        }
        .s-item { text-align: center; }
        .s-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--arc);
            line-height: 1;
        }
        .s-lbl {
            font-size: 7px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            margin-top: 3px;
        }
        .s-div { width: 1px; height: 24px; background: var(--arc-border); }

        /* Hand status */
        #hand-status {
            position: absolute;
            bottom: 72px; left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            font-size: 8px;
            letter-spacing: 3px;
            color: rgba(0,212,255,0.4);
            text-transform: uppercase;
            pointer-events: none;
            white-space: nowrap;
            transition: color 0.3s;
        }
        #hand-status.on { color: #00ff88; text-shadow: 0 0 8px #00ff88; }

        /* Change model button */
        #change-btn {
            position: absolute;
            top: 20px; right: 20px;
            z-index: 3;
            background: var(--arc-dim);
            border: 1px solid var(--arc-border);
            color: var(--arc);
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            padding: 8px 14px;
            cursor: pointer;
            text-transform: uppercase;
            opacity: 0;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
        }
        #change-btn.visible { opacity: 1; }
        #change-btn:hover { background: rgba(0,212,255,0.15); border-color: var(--arc); }

        /* Gesture guide */
        #gesture-guide {
            position: absolute;
            top: 50%; right: 20px;
            transform: translateY(-50%);
            z-index: 3;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
        }
        #gesture-guide.visible { opacity: 1; }
        .g-item {
            background: rgba(0,0,0,0.4);
            border-left: 2px solid var(--arc);
            padding: 6px 10px;
            backdrop-filter: blur(6px);
        }
        .g-action {
            font-size: 8px;
            letter-spacing: 2px;
            color: var(--arc);
            text-transform: uppercase;
        }
        .g-desc {
            font-size: 7px;
            color: rgba(255,255,255,0.35);
            margin-top: 2px;
            letter-spacing: 1px;
        }

        /* Scan line */
        .scan-line {
            position: absolute;
            left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--arc), transparent);
            animation: scan 5s linear infinite;
            opacity: 0.2;
            z-index: 2;
            pointer-events: none;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

<video id="webcam" autoplay playsinline muted></video>
<canvas id="three-canvas"></canvas>

<!-- Minimal HUD -->
<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>
<div class="scan-line"></div>

<!-- Upload screen -->
<div id="drop-zone">
    <div class="drop-box" id="drop-box">
        <div class="drop-icon">⬡</div>
        <div class="drop-title">Drop GLB File Here</div>
        <div class="drop-sub">or click to browse</div>
    </div>
    <input type="file" id="file-input" accept=".glb,.gltf">
</div>

<!-- Model name top left -->
<div id="model-label">
    <div id="model-name">—</div>
</div>

<!-- Change model button -->
<button id="change-btn" onclick="document.getElementById('file-input').click()">⬡ Change Model</button>

<!-- Gesture guide -->
<div id="gesture-guide">
    <div class="g-item">
        <div class="g-action">One Hand — Move</div>
        <div class="g-desc">Index finger controls position</div>
    </div>
    <div class="g-item">
        <div class="g-action">Pinch — Scale</div>
        <div class="g-desc">Thumb + index distance</div>
    </div>
    <div class="g-item">
        <div class="g-action">Wrist Roll — Rotate</div>
        <div class="g-desc">Tilt hand left / right</div>
    </div>
</div>

<!-- Status bar -->
<div id="status-bar">
    <div class="s-item"><div class="s-val" id="s-scale">1.0x</div><div class="s-lbl">Scale</div></div>
    <div class="s-div"></div>
    <div class="s-item"><div class="s-val" id="s-rot">0°</div><div class="s-lbl">Rotation</div></div>
    <div class="s-div"></div>
    <div class="s-item"><div class="s-val" id="s-x">0.0</div><div class="s-lbl">X</div></div>
    <div class="s-div"></div>
    <div class="s-item"><div class="s-val" id="s-y">0.0</div><div class="s-lbl">Y</div></div>
    <div class="s-div"></div>
    <div class="s-item"><div class="s-val" id="s-fps">60</div><div class="s-lbl">FPS</div></div>
</div>

<div id="hand-status">◈ NO MODEL LOADED</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

// ─── Renderer ───────────────────────────────────────────────
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 1000);
camera.position.set(0, 0, 4);

// ─── Lighting ────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);
const key = new THREE.DirectionalLight(0x00d4ff, 2.0);
key.position.set(3, 4, 2);
scene.add(key);
const fill = new THREE.DirectionalLight(0xffffff, 0.8);
fill.position.set(-3, 2, 2);
scene.add(fill);
const rim = new THREE.DirectionalLight(0x00d4ff, 0.5);
rim.position.set(0, -2, -3);
scene.add(rim);

// ─── Model container ─────────────────────────────────────────
const modelGroup = new THREE.Group();
scene.add(modelGroup);

let modelLoaded = false;
let autoRotSpeed = 0.008;

// ─── GLTF Loader ─────────────────────────────────────────────
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
const loader = new GLTFLoader();
loader.setDRACOLoader(dracoLoader);

function loadGLB(url, name) {
    // Clear old model
    while (modelGroup.children.length) modelGroup.remove(modelGroup.children[0]);
    modelLoaded = false;

    loader.load(url, gltf => {
        const model = gltf.scene;

        // Auto-center and scale to fit
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2.0 / maxDim;
        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));

        modelGroup.add(model);
        modelGroup.position.set(0, 0, 0);
        modelGroup.rotation.set(0, 0, 0);
        modelGroup.scale.set(1, 1, 1);

        modelLoaded = true;

        // Show UI
        document.getElementById('drop-zone').classList.add('hidden');
        document.getElementById('model-name').textContent = name.replace(/\.(glb|gltf)$/i, '').toUpperCase();
        document.getElementById('model-name').classList.add('visible');
        document.getElementById('change-btn').classList.add('visible');
        document.getElementById('gesture-guide').classList.add('visible');
        document.getElementById('hand-status').textContent = '◈ AWAITING HAND SIGNAL';

        URL.revokeObjectURL(url);
    }, undefined, err => {
        console.error(err);
        alert('Failed to load model. Make sure it\'s a valid GLB/GLTF file.');
    });
}

// ─── File input ──────────────────────────────────────────────
const fileInput = document.getElementById('file-input');
const dropBox = document.getElementById('drop-box');

dropBox.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    loadGLB(url, file.name);
    fileInput.value = '';
});

// Drag & drop
dropBox.addEventListener('dragover', e => { e.preventDefault(); dropBox.classList.add('drag-over'); });
dropBox.addEventListener('dragleave', () => dropBox.classList.remove('drag-over'));
dropBox.addEventListener('drop', e => {
    e.preventDefault();
    dropBox.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) { loadGLB(URL.createObjectURL(file), file.name); }
});

// ─── Hand Tracking ───────────────────────────────────────────
const videoEl = document.getElementById('webcam');
const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.75 });

let handOn = false;
let prevPinch = null;
let prevWristX = null;
let targetPos = new THREE.Vector3();
let targetScale = 1.0;
let currentScale = 1.0;
let manualRotY = 0;
let manualRotX = 0;

hands.onResults(results => {
    if (!modelLoaded) return;

    if (results.multiHandLandmarks?.length > 0) {
        handOn = true;
        const lm = results.multiHandLandmarks[0];

        const index = lm[8];   // index fingertip
        const thumb = lm[4];   // thumb tip
        const wrist = lm[0];
        const mcp   = lm[9];   // middle finger base — for wrist roll reference

        // Position: map index finger to 3D space
        const nx = (1 - index.x - 0.5) * 6 * (innerWidth / innerHeight);
        const ny = (0.5 - index.y) * 6;
        targetPos.set(nx, ny, 0);

        // Scale: pinch distance
        const pinch = Math.hypot(thumb.x - index.x, thumb.y - index.y);
        if (prevPinch !== null) {
            const delta = pinch - prevPinch;
            targetScale = Math.max(0.1, Math.min(6, targetScale + delta * 8));
        }
        prevPinch = pinch;

        // Rotation Y: wrist horizontal tilt (wrist vs middle mcp x difference)
        const wristRoll = (wrist.x - mcp.x) * 10;
        if (prevWristX !== null) {
            manualRotY += (wristRoll - prevWristX) * 0.8;
        }
        prevWristX = wristRoll;

        // Rotation X: index finger vertical position relative to wrist
        manualRotX = (index.y - wrist.y) * 3;

        // HUD
        document.getElementById('hand-status').textContent = '◉ HAND LOCKED — CONTROLLING MODEL';
        document.getElementById('hand-status').className = 'on';
        document.getElementById('s-x').textContent = nx.toFixed(1);
        document.getElementById('s-y').textContent = ny.toFixed(1);

    } else {
        handOn = false;
        prevPinch = null;
        prevWristX = null;
        document.getElementById('hand-status').textContent = '◈ AWAITING HAND SIGNAL';
        document.getElementById('hand-status').className = '';
    }
});

const camFeed = new Camera(videoEl, {
    onFrame: async () => await hands.send({ image: videoEl }),
    width: 1280, height: 720
});
camFeed.start();

// ─── Render Loop ─────────────────────────────────────────────
let frame = 0;
let lastT = performance.now();

function animate() {
    requestAnimationFrame(animate);
    frame++;

    if (!modelLoaded) {
        renderer.render(scene, camera);
        return;
    }

    if (handOn) {
        // Smooth position
        modelGroup.position.lerp(targetPos, 0.12);
        // Smooth scale
        currentScale += (targetScale - currentScale) * 0.1;
        modelGroup.scale.setScalar(currentScale);
        // Rotation from hand
        modelGroup.rotation.y += (manualRotY - modelGroup.rotation.y) * 0.08;
        modelGroup.rotation.x += (manualRotX - modelGroup.rotation.x) * 0.06;
    } else {
        // Auto rotate when no hand
        modelGroup.position.lerp(new THREE.Vector3(0, 0, 0), 0.04);
        modelGroup.scale.lerp(new THREE.Vector3(1,1,1), 0.04);
        modelGroup.rotation.y += autoRotSpeed;
        modelGroup.rotation.x += (0 - modelGroup.rotation.x) * 0.03;
    }

    // FPS
    if (frame % 15 === 0) {
        const now = performance.now();
        document.getElementById('s-fps').textContent = Math.round(15000 / (now - lastT));
        lastT = now;
    }

    // HUD updates
    document.getElementById('s-scale').textContent = currentScale.toFixed(1) + 'x';
    document.getElementById('s-rot').textContent = Math.round((modelGroup.rotation.y * 180 / Math.PI) % 360) + '°';

    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
